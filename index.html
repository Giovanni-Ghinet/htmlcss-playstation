<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htmlcss-playstation</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./Style/index.css">
    <link rel="stylesheet" href="./Style/utility.css">

</head>

<body>

    <!-- TOP BAR -->

    <div class="bg-dark text-white py-1">
        <div class="container d-flex justify-content-end fw-500">
            <div>
                SONY
            </div>
        </div>
    </div>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg dimensione-navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"> <i class="bi bi-playstation logo-navbar"></i></a>
            <button class="navbar-toggler " type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse " id="navbarNavAltMarkup">

                <div class="navbar-nav col">
                    <a class="nav-link active " aria-current="page" href="./index.html">Giochi</a>
                    <a class="nav-link " href="# ">Hardware</a>
                    <a class="nav-link " href="#">Servizi</a>
                    <a class="nav-link " aria-disabled="true">Novità</a>

                    <a class="nav-link " aria-disabled="true">Supporto</a>
                </div>

            </div>
        </div>
    </nav>

    <section class="returnal-background text-white">

        <div class="container h-100 d-flex flex-column justify-content-end pb-4">

            <img class="img-overlay" src="./img/returnal-hero-banner-logo.png" alt="Nome del gioco 'returnal'">

            <h1 class="font-size-2 py-4">Rompi il cerchio</h1>

            <p class="font-size-07 fw-500">
                Rialzati dopo ogni aconfitta e affronta una nuova sfida con ogni
                rinascita in questo esplosivo thriller fantascientifico, disponibile in esclusiva su PS5
            </p>

            <a href="#" class="btn btn-acquista text-white font-size-07 fw-500 my-2">
                Acquista ora
            </a>

        </div>
    </section>

    <section class="games-section py-4 mb-4">
        <div class="container">

            <div class="row g-4"> 

                <div class="col-6">
                    <div class="game-card selected">
                        <div class="border-wrapper">

                        <img src="./img/returnal-listing-thumb-01-ps5.jpg" alt="Gioco 1" class="img-fluid border-img">

                        </div>
                    </div>
                </div>

                <div class="col-6">
                    <div class="game-card">
                        <img src="./img/ratchet-and-clank-rift-apart-keyart.jpg" alt="Gioco 2" class="img-fluid border-img">
                        
                    </div>
                </div>

                <div class="col-6">
                    <div class="game-card">
                        <img src="./img/returnal-listing-thumb-01-ps5.jpg" alt="Gioco 1" class="img-fluid border-img">
                        
                    </div>
                </div>

                <div class="col-6">
                    <div class="game-card">
                        <img src="./img/ratchet-and-clank-rift-apart-keyart.jpg" alt="Gioco 2" class="img-fluid border-img">
                        
                    </div>
                </div>

                <div class="col-6">
                    <div class="game-card">
                        <img src="./img/returnal-listing-thumb-01-ps5.jpg" alt="Gioco 1" class="img-fluid border-img">
                        
                    </div>
                </div>

                <div class="col-6">
                    <div class="game-card">
                        <img src="./img/ratchet-and-clank-rift-apart-keyart.jpg" alt="Gioco 2" class="img-fluid border-img">
                        
                    </div>
                </div>

            </div>

        </div>
